# Project-local enso config for the enso repo itself.
#
# Shared, committed project config — distinct from
# `.enso/config.local.toml` (gitignored; where "Allow + Remember"
# writes). It layers UNDER the user config in
# `~/.config/enso/config.toml`.
#
# Scope rule (enforced): this file may set the per-backend ENVIRONMENT
# ([backend.podman|lima|egress]) — that is project-specific and must be
# reproducible for teammates/CI. It must NOT set [backend] type or
# workspace: those are a per-user/machine choice and are stripped (with
# a warning) if set outside a project... but conversely we still leave
# the backend SELECTION to the user. Pick your backend in your user
# config; this file makes whichever you pick actually build enso.
#
# enso is a pure-Go project: `go 1.26.2` (go.mod), not vendored, built
# CGO_ENABLED=0. A working sandbox therefore needs, in the guest: a Go
# toolchain ≥1.26.2, git (version stamp + VCS module fallback), and
# make (`make check` = fmt-check + vet + test + build). Module and
# toolchain fetches need egress to the Go proxy (the box is sealed
# default-deny).

# --- podman backend ----------------------------------------------------
#
# Used when the user has [backend] type = "podman". The official Go
# Alpine image already ships the 1.26.x toolchain; init only adds the
# extras the Makefile needs.

[backend.podman]
image = "golang:1.26-alpine"
init = [
    # gopls is a precompiled Alpine community package (/usr/bin/gopls,
    # on PATH for all users) — far cheaper than `go install` and no
    # module/toolchain fetch. community is enabled by default on the
    # official golang:*-alpine image. Powers [lsp.gopls] below.
    "apk add --no-cache git make gopls",
]

# --- lima backend ------------------------------------------------------
#
# Used when the user has [backend] type = "lima" (host $HOME is NOT
# mounted into the guest — see docs/Sandbox). The default Alpine image
# has no Go toolchain, so init installs a base `go` plus git/make.
# Alpine's `go` may be older than go.mod's 1.26.2; that's fine — Go's
# GOTOOLCHAIN=auto (default) fetches the exact toolchain named in
# go.mod at build time, via the allowlisted proxy below.
#
# init runs during VM provisioning, BEFORE the egress seal, so the apk
# fetch itself needs no allowlist entry.

[backend.lima]
template = "alpine"
init = [
    # Base toolchain + gopls, all from Alpine packages (community is
    # enabled by default on the Lima Alpine cloud image). gopls lands
    # at /usr/bin/gopls — on PATH for the non-root agent user, no
    # `go install`/GOBIN dance, no module or toolchain fetch. Runs at
    # VM provisioning (pre-seal), so the apk fetch needs no egress
    # allowlist entry. Powers [lsp.gopls] below.
    "apk add --no-cache go git make gopls",
]

# --- egress ------------------------------------------------------------
#
# Shared by podman + lima. The sealed box reaches ONLY these. The Go
# module proxy + checksum DB cover `go build/test/mod` for this repo's
# (public) dependencies AND GOTOOLCHAIN's go1.26.2 download — both ride
# proxy.golang.org. Add "github.com" only if you switch to
# GOPROXY=direct (the proxy already mirrors VCS sources).

[backend.egress]
allow = [
    "proxy.golang.org",
    "sum.golang.org",
]

# --- permissions -------------------------------------------------------
#
# Read-only and routine build commands the agent runs constantly in
# this repo. The user-level deny list always wins, so nothing here can
# escalate beyond what the user already permitted.

[permissions]
allow = [
    "bash(go test *)",
    "bash(go build *)",
    "bash(go vet *)",
    "bash(go mod *)",
    "bash(gofmt *)",
    "bash(make)",
    "bash(make check)",
    "bash(make fmt-check)",
    "bash(make vet)",
    "bash(make test)",
    "bash(make build)",
    "bash(git status)",
    "bash(git diff *)",
    "bash(git log *)",
    "bash(git show *)",
    "bash(git branch *)",
    "read(**)",
    "grep(**)",
    "glob(**)",
]
ask = [
    # Always prompt on push regardless of mode — blast radius matters.
    "bash(git push *)",
]

# --- language servers --------------------------------------------------
#
# Go repo → wire gopls. Spawned lazily on first lsp_* use. Needs
# `gopls` on PATH where the agent core runs: provided in-guest by the
# podman/lima init above (apk package), or on your host for the local
# backend (`apk add gopls`, your distro's package, or `go install
# golang.org/x/tools/gopls@latest`).

[lsp.gopls]
command      = "gopls"
extensions   = [".go"]
root_markers = ["go.mod", ".git"]
language_id  = "go"
